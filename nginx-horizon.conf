# /etc/nginx/sites-available/horizon
# Campione Infrastructure — Stellar Horizon API proxy with API key auth

# Rate limit zone — keyed by API key header, 10MB zone = ~80k keys
limit_req_zone $http_x_api_key zone=horizon_keys:10m rate=30r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name horizon.campioneinfrastructure.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name horizon.campioneinfrastructure.com;

    ssl_certificate     /etc/letsencrypt/live/horizon.campioneinfrastructure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horizon.campioneinfrastructure.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Public routes (no auth) ─────────────────────────────────────────────

    # Self-serve portal landing page
    location = /portal {
        proxy_pass http://127.0.0.1:9998/portal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Portal subdirectory (success page, etc.)
    location /portal/ {
        proxy_pass http://127.0.0.1:9998/portal/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stripe checkout session creation
    location = /create-checkout-session {
        proxy_pass http://127.0.0.1:9998/create-checkout-session;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stripe webhook (must NOT require API key)
    location = /stripe-webhook {
        proxy_pass http://127.0.0.1:9998/stripe-webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Auth subrequest (internal only) ────────────────────────────────────
    location = /_auth {
        internal;
        proxy_pass http://127.0.0.1:9998/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── Protected Horizon API (all other routes) ────────────────────────────
    location / {
        # Step 1: validate API key
        auth_request /_auth;

        # Step 2: rate limit (30 req/min per key, burst 10)
        limit_req zone=horizon_keys burst=10 nodelay;
        limit_req_status 429;

        # Step 3: proxy to Stellar Horizon
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # Friendly error pages
        error_page 401 = @unauthorized;
        error_page 429 = @ratelimited;
    }

    # ── Error responses ─────────────────────────────────────────────────────
    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"Invalid or missing API key","info":"Get a key at https://horizon.campioneinfrastructure.com/portal"}';
    }

    location @ratelimited {
        default_type application/json;
        return 429 '{"error":"Rate limit exceeded","limit":"30 requests/minute","upgrade":"Contact kenneth@campioneinfrastructure.com"}';
    }
}
